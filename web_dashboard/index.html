<!-- index.html -->

<!DOCTYPE html>
<html>
<head>

    <title>PersistenceAI Pro</title>

    <script src="https://js.puter.com/v2/"></script>

    <style>

        body {
            background: #0d0d0d;
            color: white;
            font-family: sans-serif;
            padding: 30px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
        }

    </style>

</head>
<body>

<h1>PersistenceAI Pro</h1>

<p>AI That Builds</p>

<textarea id="prompt"></textarea>

<button onclick="runAI()">
    Run Agent
</button>

<pre id="output"></pre>

<script>

async function runAI() {

    const prompt =
    document.getElementById("prompt").value;

    const response = await fetch(
        "http://127.0.0.1:8000/chat",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: prompt
            })
        }
    );

    const data = await response.json();

    document.getElementById("output")
        .innerText = data.response;
}

</script>

</body>
</html>
